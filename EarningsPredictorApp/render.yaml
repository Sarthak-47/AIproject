services:
  - type: web
    name: earnings-predictor-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python train.py"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
