services:
  # --- Backend Web Service (FastAPI) ---
  - type: web
    name: earnings-predictor-api
    env: python
    rootDir: EarningsPredictorApp/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # --- Frontend Static Site (React/Vite) ---
  - type: static_site
    name: earnings-predictor-ui
    rootDir: EarningsPredictorApp/frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://earnings-predictor-api.onrender.com # TODO: Update this match your backend URL after deployment
    routes:
      - type: rewrite
        source: /(.*)
        destination: /index.html
